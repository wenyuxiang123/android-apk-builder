name: Build DeltaAim APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deltaaim-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
        
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Results" >> $GITHUB_STEP_SUMMARY
        echo "- APK Location: app/build/outputs/apk/debug/" >> $GITHUB_STEP_SUMMARY
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Build may have failed"
